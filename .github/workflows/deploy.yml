name: Deploy to AWS ECR

on:
  push:
    branches:
      - main
    # Only run pipeline if backend changes are made
    paths-ignore:
      - 'frontend/**'
      - 'README.md'
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Download Ephemeris Data from Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download v1.0.0 --repo ${{ github.repository }} --pattern "ephemeris_data.zip" --dir .

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
        
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Build, tag, and push Docker image to Amazon ECR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        platforms: linux/amd64
        tags: ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_REPOSITORY }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Optional: Automatically trigger the Lambda function to update to the new image
    # - name: Update AWS Lambda Function
    #   run: |
    #     aws lambda update-function-code \
    #       --function-name ${{ secrets.AWS_LAMBDA_FUNCTION_NAME }} \
    #       --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ secrets.AWS_ECR_REPOSITORY }}:latest
